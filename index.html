<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSRV Validator Status</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="header">
    <h1><span class="accent">DSRV</span> Validator Status</h1>
    <span class="meta">Data: <span id="data-time">—</span> &middot; Prices: <span id="prices-loading">loading…</span> <span id="prices-updated"></span></span>
  </header>
  <div class="layout-full">
    <div class="panel panel-aum">
      <div class="panel-title">Total AUM by Month (USD)</div>
      <div class="chart-wrap">
        <canvas id="chart"></canvas>
      </div>
    </div>
    <div class="panel panel-tiles" id="delegation-panel">
      <div class="panel-title panel-title-toggle" id="delegation-toggle">
        <span>Delegation Change</span>
        <span class="toggle-icon" id="toggle-icon">▼</span>
      </div>
      <div class="tile-grid-wrap" id="tile-grid-wrap">
        <div class="tile-grid" id="tile-grid"></div>
      </div>
    </div>
    <div class="panel panel-table">
      <div class="search-bar-wrap">
        <div class="spotlight-search">
          <span class="search-icon">⌕</span>
          <input type="text" id="partner-search" placeholder="Spotlight search" autocomplete="off" />
        </div>
      </div>
      <div class="panel-title">DSRV Validator Partners</div>
      <div class="table-wrap">
        <table id="main-table">
          <thead>
            <tr>
              <th class="col-partner">Partner</th>
              <th class="num col-delegation">Delegation</th>
              <th>Token</th>
              <th class="num col-price-24h">
                <span>Price (USD)</span>
                <span class="sub-col">24h %</span>
              </th>
              <th class="num">APR %</th>
              <th class="num">Commission %</th>
              <th class="num">Monthly Reward (USD)</th>
              <th class="num">Annual Reward (USD)</th>
              <th class="num">AUM</th>
              <th class="num">Uptime %</th>
              <th class="link-cell">Delegation · Uptime</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
