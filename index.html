<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSRV Validator Status — Bloomberg Terminal</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="header">
    <h1>DSRV Validator Status</h1>
    <span class="meta">Data: <span id="data-time">—</span> | Prices: <span id="prices-loading">loading…</span> <span id="prices-updated"></span></span>
  </header>
  <div class="layout">
    <div class="panel" style="grid-column: 1; grid-row: 1;">
      <div class="panel-title">Total AUM by month (USD)</div>
      <div class="chart-wrap">
        <canvas id="chart"></canvas>
      </div>
    </div>
    <div class="panel" style="grid-column: 2; grid-row: 1 / 3;">
      <div class="panel-title">Quick ref — Explorer links</div>
      <div class="table-wrap">
        <p id="summary" class="no-data" style="padding: 8px; font-size: 0.7rem;"></p>
      </div>
    </div>
    <div class="panel" style="grid-column: 1; grid-row: 2;">
      <div class="panel-title">DSRV validator partners</div>
      <div class="table-wrap">
        <table id="main-table">
          <thead>
            <tr>
              <th>Partner</th>
              <th class="num">Delegation</th>
              <th>Token</th>
              <th class="num">Price (USD)</th>
              <th class="num">APR %</th>
              <th class="num">Commission %</th>
              <th class="num">Annual Reward (USD)</th>
              <th class="num">AUM</th>
              <th class="num">24h %</th>
              <th class="num">Uptime %</th>
              <th class="link-cell">Delegation · Uptime</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
